[profile.default]
solc = '0.8.28'
bytecode_hash = "none"
evm_version = 'cancun'
optimizer_runs = 200
libs = ["node_modules", "lib"]
fs_permissions = [{ access = "read-write", path = "./"}]
# Archived, unused contracts (e.g. JBSwapCCIPSucker) and their tests live under `archive/` folders and are
# excluded from compilation, sizing, and test runs. Kept for reference only.
skip = ["src/archive/**", "test/archive/**"]

[fuzz]
runs = 4096

[invariant]
runs = 1024
depth = 100
fail_on_revert = false

[lint]
exclude_lints = ["mixed-case-variable", "pascal-case-struct"]

[fmt]
number_underscore = "thousands"
multiline_func_header = "all"
wrap_comments = true

[rpc_endpoints]
ethereum = "${RPC_ETHEREUM_MAINNET}"
ethereum_sepolia = "${RPC_ETHEREUM_SEPOLIA}"
arbitrum_sepolia = "${RPC_ARBITRUM_SEPOLIA}"
arbitrum = "${RPC_ARBITRUM_MAINNET}"
optimism = "${RPC_OPTIMISM_MAINNET}"
base = "${RPC_BASE_MAINNET}"
celo = "${RPC_CELO_MAINNET}"
tempo = "${RPC_TEMPO_MAINNET}"
