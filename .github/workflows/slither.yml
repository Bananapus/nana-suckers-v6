name: slither
on:
    pull_request:
      branches:
        - main
    push:
      branches:
        - main
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - name: Install npm dependencies
        run: npm install --omit=dev
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run slither
        # continue-on-error due to slither bug: AssertionError in IR generation for JBCeloSucker._sendRoot
        # (slither 0.11.x crashes on struct construction in _sendRoot). Re-enable once slither fixes this.
        continue-on-error: true
        uses: crytic/slither-action@v0.4.0
        with:
            slither-config: slither-ci.config.json
            fail-on: medium
