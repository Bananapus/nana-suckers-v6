name: slither
on:
    pull_request:
      branches:
        - main
    push:
      branches:
        - main
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - name: Install npm dependencies
        run: npm install --omit=dev
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Run slither
        uses: crytic/slither-action@v0.4.0
        # Known Slither IR generation crash on JBSwapCCIPSucker._buildSnapshotAndSend
        # due to named-argument virtual dispatch through 3-level inheritance chain.
        # Tracked upstream: crytic/slither#2600
        continue-on-error: true
        with:
            slither-config: slither-ci.config.json
            fail-on: medium
